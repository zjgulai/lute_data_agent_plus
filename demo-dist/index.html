<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMV 智能归因系统 - Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tree-line { border-left: 2px solid #E5E7EB; }
        .org-node { background: linear-gradient(135deg, #3B82F6 0%, #1E40AF 100%); }
        .op-node { background: linear-gradient(135deg, #10B981 0%, #047857 100%); }
        .action-node { background: linear-gradient(135deg, #F59E0B 0%, #B45309 100%); }
        .anomaly-node { animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // 完整指标树数据
        const orgTreeData = {
            id: 'gmv', name: 'GMV', type: 'root', level: 0, change: '-28.8%',
            children: [{
                id: 'org_side', name: '组织侧', type: 'organization', level: 1, weight: 1.0,
                children: [{
                    id: 'org_apac', name: '亚太区', type: 'organization', level: 2, weight: 0.4, change: '-45.2%',
                    children: [{
                        id: 'org_sg', name: '新加坡', type: 'organization', level: 3, weight: 0.6, change: '-62.3%',
                        raci: { responsible: ['李明'], accountable: '王芳', consulted: ['数据分析师'], informed: ['亚太区总经理'] },
                        children: [{
                            id: 'org_sg_marketing', name: '新加坡市场部', type: 'organization', level: 4, weight: 1.0,
                            children: [{
                                id: 'org_sg_manager', name: '负责人: 王芳', type: 'organization', level: 5,
                                raci: { responsible: ['投放专员-李明'], accountable: '市场总监-王芳', consulted: ['数据分析师-张华'], informed: ['亚太区总经理-陈总'] }
                            }]
                        }]
                    }, {
                        id: 'org_cn', name: '中国', type: 'organization', level: 3, weight: 0.3, change: '-15.2%',
                        children: [{ id: 'org_cn_marketing', name: '中国市场部', type: 'organization', level: 4 }]
                    }]
                }, {
                    id: 'org_eu', name: '欧洲区', type: 'organization', level: 2, weight: 0.35, change: '-12.1%',
                    children: [{ id: 'org_uk', name: '英国', type: 'organization', level: 3 }]
                }, {
                    id: 'org_us', name: '美洲区', type: 'organization', level: 2, weight: 0.25, change: '+5.3%',
                    children: [{ id: 'org_ca', name: '加拿大', type: 'organization', level: 3 }]
                }]
            }]
        };
        
        const opTreeData = {
            id: 'gmv', name: 'GMV', type: 'root', level: 0, formula: 'UV × CR × AOV',
            children: [{
                id: 'op_side', name: '经营侧', type: 'operation', level: 1, weight: 1.0,
                children: [{
                    id: 'op_user', name: '用户', type: 'operation', level: 2, formula: 'UV × CR × AOV',
                    children: [{
                        id: 'op_uv', name: 'UV', type: 'operation', level: 3, formula: '新客UV + 老客UV', change: '-35.2%',
                        dimensionPool: ['用户类型', '渠道', '地区'],
                        children: [{
                            id: 'op_new_uv', name: '新客UV', type: 'operation', level: 4, change: '-48.5%',
                            children: [{
                                id: 'act_new_channel', name: '新客获取渠道', type: 'action', level: 5, entropy: 0.85,
                                raci: { responsible: ['投放专员'], accountable: '增长负责人', consulted: ['渠道经理'], informed: ['市场总监'] }
                            }]
                        }, {
                            id: 'op_old_uv', name: '老客UV', type: 'operation', level: 4, change: '-18.3%',
                            children: [{
                                id: 'act_member', name: '会员日活动参与率', type: 'action', level: 5, entropy: 0.72, change: '-62.3%',
                                raci: { responsible: ['活动运营-赵敏'], accountable: '用户运营总监-孙丽', consulted: ['数据分析师'], informed: ['亚太区总经理'] }
                            }]
                        }]
                    }]
                }, {
                    id: 'op_marketing', name: '营销', type: 'operation', level: 2,
                    children: [{
                        id: 'op_ad', name: '广告投放', type: 'operation', level: 3, change: '-28.5%',
                        dimensionPool: ['广告渠道', '投放策略'],
                        children: [{
                            id: 'act_fb', name: 'Facebook广告', type: 'action', level: 4, change: '-45.2%',
                            raci: { responsible: ['海外投放-周杰'], accountable: '投放主管-吴强', consulted: ['创意团队'], informed: ['市场总监'] }
                        }, {
                            id: 'act_google', name: 'Google广告', type: 'action', level: 4, change: '-22.1%',
                            raci: { responsible: ['SEM专员-郑雨'], accountable: '搜索负责人-钱伟', consulted: ['SEO团队'], informed: ['市场总监'] }
                        }]
                    }]
                }, {
                    id: 'op_product', name: '产品', type: 'operation', level: 2,
                    children: [{ id: 'op_price', name: '价格策略', type: 'operation', level: 3 }]
                }, {
                    id: 'op_supply', name: '供应链', type: 'operation', level: 2,
                    children: [{ id: 'op_logistics', name: '物流时效', type: 'operation', level: 3 }]
                }]
            }]
        };

        // 树节点组件
        const TreeNode = ({ node, isOrg, isExpanded, onToggle, isSelected, onSelect, isAnomaly }) => {
            const bgClass = node.type === 'organization' || (isOrg && node.level > 0) ? 'org-node' :
                           node.type === 'action' ? 'action-node' : 'op-node';
            const isLeaf = !node.children || node.children.length === 0;
            
            return (
                <div className="ml-4">
                    <div 
                        className={\`inline-flex items-center gap-2 px-3 py-2 rounded-lg text-white text-sm cursor-pointer transition-all hover:scale-105 \${
                            bgClass} \${isSelected ? 'ring-4 ring-purple-400' : ''} \${isAnomaly ? 'anomaly-node' : ''}\`}
                        onClick={() => { onToggle(); onSelect(); }}
                    >
                        {!isLeaf && (
                            <span className="text-xs">{isExpanded ? '▼' : '▶'}</span>
                        )}
                        <span className="font-medium">{node.name}</span>
                        {node.change && (
                            <span className={\`text-xs px-1.5 py-0.5 rounded \${node.change.includes('-') ? 'bg-red-500' : 'bg-green-500'}\`}>
                                {node.change}
                            </span>
                        )}
                        {node.entropy > 0.7 && (
                            <span className="text-xs bg-red-600 px-1.5 py-0.5 rounded animate-pulse">⚠️</span>
                        )}
                    </div>
                    {isExpanded && node.children && (
                        <div className="tree-line ml-4 mt-2 pl-2">
                            {node.children.map((child, idx) => (
                                <TreeNodeWrapper key={child.id} node={child} isOrg={isOrg} isAnomaly={isAnomaly} />
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const TreeNodeWrapper = ({ node, isOrg, isAnomaly }) => {
            const [expanded, setExpanded] = useState(node.level < 3);
            const [selected, setSelected] = useState(false);
            return (
                <TreeNode 
                    node={node} 
                    isOrg={isOrg}
                    isExpanded={expanded} 
                    onToggle={() => setExpanded(!expanded)}
                    isSelected={selected}
                    onSelect={() => setSelected(!selected)}
                    isAnomaly={isAnomaly && (node.id === 'act_member' || node.id === 'org_sg')}
                />
            );
        };

        // RACI 矩阵组件
        const RACIMatrix = ({ raci, title }) => {
            if (!raci) return null;
            return (
                <div className="bg-white rounded-xl shadow-sm p-4 mt-4">
                    <h4 className="font-semibold text-gray-800 mb-3">{title || 'RACI 责任矩阵'}</h4>
                    <div className="grid grid-cols-4 gap-2">
                        {[
                            { key: 'responsible', label: 'R - 执行', color: 'bg-blue-100 text-blue-800', icon: '🛠️' },
                            { key: 'accountable', label: 'A - 负责', color: 'bg-red-100 text-red-800', icon: '✅' },
                            { key: 'consulted', label: 'C - 咨询', color: 'bg-amber-100 text-amber-800', icon: '💬' },
                            { key: 'informed', label: 'I - 知会', color: 'bg-gray-100 text-gray-800', icon: '📧' }
                        ].map(({ key, label, color, icon }) => (
                            <div key={key} className={\`\${color} rounded-lg p-3\`}>
                                <div className="text-xs font-medium mb-1">{icon} {label}</div>
                                <div className="text-sm">
                                    {Array.isArray(raci[key]) ? raci[key].join(', ') : raci[key] || '-'}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // 主应用
        const App = () => {
            const [activeTab, setActiveTab] = useState('dual'); // 'dual' | 'org' | 'op'
            const [selectedNode, setSelectedNode] = useState(null);
            
            // 归因路径数据
            const attributionPath = [
                { name: 'GMV', change: '-28.8%', type: 'root' },
                { name: '亚太区', change: '-45.2%', type: 'org' },
                { name: '新加坡', change: '-62.3%', type: 'org' },
                { name: '老客UV', change: '-18.3%', type: 'op' },
                { name: '会员日活动', change: '-62.3%', type: 'action', isRootCause: true }
            ];

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <header className="bg-gradient-to-r from-blue-600 to-purple-700 text-white px-6 py-4 shadow-lg">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="bg-white/20 p-2 rounded-lg text-2xl">📉</div>
                                    <div>
                                        <h1 className="text-xl font-bold">GMV 智能归因系统</h1>
                                        <p className="text-xs text-blue-100">双指标树 + 熵减算法 + RACI 定责</p>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    {['dual', 'org', 'op'].map(tab => (
                                        <button
                                            key={tab}
                                            onClick={() => setActiveTab(tab)}
                                            className={\`px-4 py-2 rounded-lg text-sm transition \${
                                                activeTab === tab ? 'bg-white text-blue-600' : 'bg-white/20 hover:bg-white/30'
                                            }\`}
                                        >
                                            {tab === 'dual' ? '双树对比' : tab === 'org' ? '组织侧' : '经营侧'}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-6 space-y-6">
                        {/* 双指标树展示 */}
                        {(activeTab === 'dual' || activeTab === 'org' || activeTab === 'op') && (
                            <div className={\`grid \${activeTab === 'dual' ? 'grid-cols-2' : 'grid-cols-1'} gap-6\`}>
                                {/* 组织侧树 */}
                                {(activeTab === 'dual' || activeTab === 'org') && (
                                    <div className="bg-white rounded-xl shadow-sm p-6">
                                        <div className="flex items-center justify-between mb-4">
                                            <h3 className="text-lg font-semibold text-blue-800 flex items-center gap-2">
                                                <span className="w-3 h-3 rounded-full bg-blue-500"></span>
                                                【组织侧】定责树
                                            </h3>
                                            <span className="text-xs text-gray-500">预定义层级，不走熵减</span>
                                        </div>
                                        <div className="overflow-auto max-h-96">
                                            <TreeNodeWrapper node={orgTreeData} isOrg={true} isAnomaly={true} />
                                        </div>
                                        {orgTreeData.children[0].children[0].children[0].raci && (
                                            <RACIMatrix raci={orgTreeData.children[0].children[0].children[0].raci} title="新加坡节点 RACI" />
                                        )}
                                    </div>
                                )}
                                
                                {/* 经营侧树 */}
                                {(activeTab === 'dual' || activeTab === 'op') && (
                                    <div className="bg-white rounded-xl shadow-sm p-6">
                                        <div className="flex items-center justify-between mb-4">
                                            <h3 className="text-lg font-semibold text-green-800 flex items-center gap-2">
                                                <span className="w-3 h-3 rounded-full bg-green-500"></span>
                                                【经营侧】归因树
                                            </h3>
                                            <span className="text-xs text-gray-500">维度池 + 熵减算法驱动</span>
                                        </div>
                                        <div className="overflow-auto max-h-96">
                                            <TreeNodeWrapper node={opTreeData} isOrg={false} isAnomaly={true} />
                                        </div>
                                        {opTreeData.children[0].children[0].children[0].children[1].children[0].raci && (
                                            <RACIMatrix 
                                                raci={opTreeData.children[0].children[0].children[0].children[1].children[0].raci} 
                                                title="根因节点 RACI" 
                                            />
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 归因链路 */}
                        <div className="bg-white rounded-xl shadow-sm p-6">
                            <h3 className="text-lg font-semibold mb-4">🔗 归因链路（异常传播路径）</h3>
                            <div className="flex items-center gap-3 overflow-x-auto pb-4">
                                {attributionPath.map((item, i) => (
                                    <React.Fragment key={i}>
                                        <div className={\`flex flex-col items-center p-3 rounded-lg min-w-[120px] \${
                                            item.isRootCause ? 'bg-red-100 border-2 border-red-500' :
                                            item.type === 'org' ? 'bg-blue-100' :
                                            item.type === 'op' ? 'bg-green-100' : 'bg-gray-100'
                                        }\`}>
                                            <span className="font-medium text-gray-800">{item.name}</span>
                                            <span className={\`text-sm \${item.change?.includes('-') ? 'text-red-600' : 'text-green-600'}\`}>
                                                {item.change}
                                            </span>
                                            {item.isRootCause && (
                                                <span className="text-xs bg-red-500 text-white px-2 py-0.5 rounded mt-1">根因</span>
                                            )}
                                        </div>
                                        {i < attributionPath.length - 1 && (
                                            <svg className="w-6 h-6 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                                            </svg>
                                        )}
                                    </React.Fragment>
                                ))}
                            </div>
                        </div>

                        {/* 最终结论与 RACI */}
                        <div className="bg-gradient-to-r from-red-50 to-orange-50 rounded-xl shadow-sm p-6 border border-red-200">
                            <h3 className="text-lg font-semibold text-red-800 mb-4">📋 归因结论与责任划分</h3>
                            
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                {/* 根因分析 */}
                                <div className="space-y-4">
                                    <div className="bg-white rounded-lg p-4">
                                        <h4 className="font-semibold text-gray-800 mb-2">🎯 核心发现</h4>
                                        <p className="text-gray-700">
                                            本次 GMV 下滑主要由 <strong className="text-red-600">新加坡市场部</strong> 的 
                                            <strong className="text-red-600">会员日活动参与率</strong> 下降驱动，
                                            环比下降 <strong>62.3%</strong>，超过熵减阈值 0.7，是最大异常点。
                                        </p>
                                    </div>
                                    <div className="bg-white rounded-lg p-4">
                                        <h4 className="font-semibold text-gray-800 mb-2">💡 业务建议</h4>
                                        <ul className="list-disc list-inside text-gray-700 space-y-1 text-sm">
                                            <li>紧急排查会员日活动的推送机制是否正常</li>
                                            <li>检查新加坡地区的用户触达渠道（Push/短信/邮件）</li>
                                            <li>对比历史同期活动数据，定位具体环节问题</li>
                                        </ul>
                                    </div>
                                </div>
                                
                                {/* RACI 矩阵 */}
                                <div>
                                    <RACIMatrix 
                                        raci={{ 
                                            responsible: ['活动运营-赵敏', '投放专员-李明'], 
                                            accountable: '新加坡市场总监-王芳', 
                                            consulted: ['数据分析师-张华', '用户运营-孙丽'], 
                                            informed: ['亚太区总经理-陈总', 'CEO办公室'] 
                                        }} 
                                        title="🎯 优化责任矩阵 (RACI)"
                                    />
                                    <div className="mt-4 bg-white rounded-lg p-4">
                                        <h4 className="font-semibold text-gray-800 mb-2">⏰ 时间要求</h4>
                                        <div className="flex items-center gap-4 text-sm">
                                            <span className="px-3 py-1 bg-red-100 text-red-700 rounded">48小时内：问题排查</span>
                                            <span className="px-3 py-1 bg-amber-100 text-amber-700 rounded">1周内：方案执行</span>
                                            <span className="px-3 py-1 bg-green-100 text-green-700 rounded">2周内：效果验证</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 说明 */}
                        <div className="bg-blue-50 rounded-xl p-4 border border-blue-200">
                            <p className="text-sm text-blue-800">
                                <strong>💡 Demo 说明：</strong> 本演示展示了"双指标树"设计——左侧组织侧用于定责（谁该负责），右侧经营侧用于归因（什么原因）。
                                RACI 矩阵明确了优化责任：R=执行人，A=负责人，C=需咨询，I=需知会。
                            </p>
                        </div>
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
