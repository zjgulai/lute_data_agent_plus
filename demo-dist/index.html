<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMV 智能归因系统 - Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const App = () => {
            const [role, setRole] = useState('analyst');
            return (
                <div className="min-h-screen">
                    <header className="bg-gradient-to-r from-blue-600 to-purple-700 text-white px-6 py-4 shadow-lg">
                        <div className="flex items-center justify-between max-w-7xl mx-auto">
                            <div className="flex items-center gap-3">
                                <div className="bg-white/20 p-2 rounded-lg">📉</div>
                                <div>
                                    <h1 className="text-xl font-bold">GMV 智能归因系统</h1>
                                    <p className="text-xs text-blue-100">基于熵减算法的归因分析平台</p>
                                </div>
                            </div>
                            <select value={role} onChange={(e) => setRole(e.target.value)} className="bg-white/20 text-sm px-3 py-1.5 rounded-lg outline-none">
                                <option value="analyst">🔬 数据分析师</option>
                                <option value="business">💼 业务运营</option>
                                <option value="executive">👔 高管</option>
                            </select>
                        </div>
                    </header>
                    <main className="max-w-7xl mx-auto p-6">
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="bg-white rounded-xl shadow-sm p-6">
                                <h3 className="text-lg font-semibold mb-4">📈 GMV 趋势分析</h3>
                                <div className="h-48 flex items-end gap-1">
                                    {[85,70,45,40,55,75,72,50,48,65,78,80,68,55,50].map((h,i) => (
                                        <div key={i} className="flex-1 flex flex-col items-center">
                                            <div className={"w-full rounded-t " + (i===7?"bg-red-500":"bg-blue-500")} style={{height:h+"%"}}></div>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-4 p-3 bg-red-50 rounded-lg text-sm text-red-700">
                                    ⚠️ 检测到 2024-01-08 GMV 异常，环比下降 28.8%
                                </div>
                            </div>
                            <div className="bg-white rounded-xl shadow-sm p-6">
                                <h3 className="text-lg font-semibold mb-4">💡 归因分析流程</h3>
                                <div className="space-y-3">
                                    {[
                                        {t:'GMV 异常检测',s:'completed',r:'GMV 环比下降 28.8%'},
                                        {t:'第一层归因',s:'completed',r:'订单量下降 25.3%'},
                                        {t:'第二层归因',s:'completed',r:'新客订单下降 45.2%'},
                                        {t:'交叉维度分析',s:'completed',r:'抖音直播+美妆 ↓62.3%'},
                                        {t:'结论生成',s:'current',r:''}
                                    ].map((step,i) => (
                                        <div key={i} className={"p-3 rounded-lg border-2 " + (step.s==='current'?'border-blue-500 bg-blue-50':'border-green-500 bg-green-50')}>
                                            <div className="flex items-center gap-2">
                                                <div className={"w-6 h-6 rounded-full flex items-center justify-center text-white text-xs " + (step.s==='completed'?'bg-green-500':'bg-blue-500')}>
                                                    {step.s==='completed'?'✓':i+1}
                                                </div>
                                                <span className="font-medium">{step.t}</span>
                                            </div>
                                            {step.r && <p className="text-sm text-gray-600 mt-1 ml-8">{step.r}</p>}
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-white rounded-xl shadow-sm p-6">
                                <h3 className="text-lg font-semibold mb-4">🌳 指标树归因</h3>
                                <div className="space-y-2">
                                    <div className="bg-blue-600 text-white px-3 py-2 rounded-lg inline-block">GMV ↓28.8%</div>
                                    <div className="ml-6 space-y-2 border-l-2 border-blue-200 pl-4">
                                        <div className="bg-blue-100 text-blue-800 px-3 py-2 rounded-lg inline-block">订单量 ↓25.3%</div>
                                        <div className="ml-6 space-y-2 border-l-2 border-blue-200 pl-4">
                                            <div className="bg-gray-100 text-gray-700 px-3 py-2 rounded-lg inline-block">新客订单 ↓45.2%</div>
                                            <div className="bg-gray-100 text-gray-700 px-3 py-2 rounded-lg inline-block">老客订单 ↓12.1%</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="mt-6 bg-white rounded-xl shadow-sm p-6">
                            <h3 className="text-lg font-semibold mb-4">🔗 归因链路</h3>
                            <div className="flex items-center gap-3 overflow-x-auto pb-2">
                                {['GMV ↓28.8%','订单量 ↓25.3%','新客订单 ↓45.2%','抖音+美妆 ↓62.3%','主播排期冲突 ✅'].map((item,i) => (
                                    <React.Fragment key={i}>
                                        <div className={"px-4 py-2 rounded-lg whitespace-nowrap " + (i===0?'bg-red-100 text-red-800':i===4?'bg-green-100 text-green-800':'bg-blue-100 text-blue-800')}>{item}</div>
                                        {i<4 && <span className="text-gray-400">→</span>}
                                    </React.Fragment>
                                ))}
                            </div>
                        </div>
                        <div className="mt-6 p-4 bg-gradient-to-r from-blue-50 to-purple-50 rounded-xl border border-blue-200">
                            <p className="text-sm text-blue-800">
                                🎮 <strong>演示模式</strong>：当前为 Demo 演示版本，使用模拟数据展示系统功能。
                                完整功能请查看 <a href="https://github.com/zjgulai/lute_data_agent_plus" className="underline">GitHub 仓库</a>
                            </p>
                        </div>
                    </main>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
