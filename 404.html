<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMV 智能归因系统 - Demo v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>body{font-family:-apple-system,BlinkMacSystemFont,sans-serif}</style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>
    <script type="text/babel">
const{useState}=React;

// 组织树数据
const orgTree={
  id:"gmv",name:"GMV",type:"root",change:"-28.8%",
  children:[{
    id:"org_side",name:"【组织侧】定责",type:"org",level:1,
    children:[{
      id:"org_apac",name:"亚太区",type:"org",level:2,change:"-45.2%",
      raci:{responsible:["李明"],accountable:"王芳",consulted:["数据分析师"],informed:["亚太区总经理"]},
      children:[{
        id:"org_sg",name:"🇸🇬 新加坡",type:"org",level:3,change:"-62.3% ⚠️",
        children:[{
          id:"org_sg_mkt",name:"新加坡市场部",type:"org",level:4,
          raci:{responsible:["投放专员-李明","活动运营-赵敏"],accountable:"市场总监-王芳",consulted:["数据分析师-张华"],informed:["亚太区总经理-陈总"]}
        }]
      }]
    }]
  }]
};

// 经营树数据  
const opTree={
  id:"gmv",name:"GMV",type:"root",formula:"UV×CR×AOV",
  children:[{
    id:"op_side",name:"【经营侧】归因",type:"op",level:1,
    children:[{
      id:"op_user",name:"用户模块",type:"op",level:2,formula:"UV × CR × AOV",
      children:[{
        id:"op_uv",name:"UV",type:"op",level:3,change:"-35.2%",
        children:[{
          id:"op_new",name:"新客UV -48.5%",type:"op",level:4
        },{
          id:"op_old",name:"老客UV -18.3%",type:"op",level:4,
          children:[{
            id:"act_member",name:"🎯 会员日活动参与率",type:"action",level:5,change:"-62.3%",entropy:"0.85",
            raci:{responsible:["活动运营-赵敏"],accountable:"用户运营总监-孙丽",consulted:["数据分析师","产品经理"],informed:["亚太区总经理","CEO办公室"]}
          }]
        }]
      }]
    },{
      id:"op_mkt",name:"营销模块",type:"op",level:2,
      children:[{
        id:"op_ad",name:"广告投放",type:"op",level:3,change:"-28.5%",
        children:[{
          id:"act_fb",name:"Facebook广告 -45.2%",type:"action",level:4
        },{
          id:"act_google",name:"Google广告 -22.1%",type:"action",level:4
        }]
      }]
    },{
      id:"op_prod",name:"产品模块",type:"op",level:2
    },{
      id:"op_supply",name:"供应链",type:"op",level:2
    }]
  }]
};

// 树节点组件
function TreeNode({node,isOrg,isExp,onToggle,isAnomaly}){
  const hasChildren=node.children&&node.children.length>0;
  let bgClass;
  if(isOrg){
    bgClass="bg-gradient-to-r from-blue-600 to-blue-800";
  }else if(node.type==="action"){
    bgClass="bg-gradient-to-r from-amber-500 to-amber-700";
  }else{
    bgClass="bg-gradient-to-r from-emerald-500 to-emerald-700";
  }
  const animClass=isAnomaly?" animate-pulse ring-2 ring-red-400":"";
  
  return(
    <div className="ml-2">
      <div className={bgClass+" inline-flex items-center gap-2 px-3 py-2 rounded-lg text-white text-sm cursor-pointer transition hover:scale-105 "+animClass} onClick={()=>hasChildren&&onToggle()}>
        {hasChildren&&<span>{isExp?"▼":"▶"}</span>}
        <span className="font-bold">{node.name}</span>
        {node.change&&<span className={node.change.includes("-")?"text-xs px-2 py-0.5 rounded bg-red-500":"text-xs px-2 py-0.5 rounded bg-green-500"}>{node.change}</span>}
        {node.entropy>0.7&&<span className="text-xs bg-red-600 px-2 py-0.5 rounded font-bold">🔥根因</span>}
      </div>
      {isExp&&hasChildren&&(
        <div className="ml-4 mt-2 pl-2 border-l-2 border-gray-300">
          {node.children.map(c=>(
            <TreeNodeWrap key={c.id} node={c} isOrg={isOrg} isAnomaly={isAnomaly&&(c.id==="org_sg"||c.id==="act_member")}/>
          ))}
        </div>
      )}
    </div>
  );
}

function TreeNodeWrap({node,isOrg,isAnomaly}){
  const[exp,setExp]=useState(node.level<3);
  return<TreeNode node={node} isOrg={isOrg} isExp={exp} onToggle={()=>setExp(!exp)} isAnomaly={isAnomaly}/>;
}

// RACI组件
function RACI({raci}){
  if(!raci)return null;
  const items=[
    {k:"responsible",l:"R-执行",c:"bg-blue-100 text-blue-800"},
    {k:"accountable",l:"A-负责",c:"bg-red-100 text-red-800"},
    {k:"consulted",l:"C-咨询",c:"bg-amber-100 text-amber-800"},
    {k:"informed",l:"I-知会",c:"bg-gray-100 text-gray-800"}
  ];
  return(
    <div className="mt-3 bg-white rounded-lg shadow p-3">
      <div className="grid grid-cols-4 gap-2 text-xs">
        {items.map(({k,l,c})=>(
          <div key={k} className={c+" rounded p-2"}>
            <div className="font-bold mb-1">{l}</div>
            <div>{Array.isArray(raci[k])?raci[k].join(", "):raci[k]||"-"}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// 主应用
function App(){
  const[tab,setTab]=useState("dual");
  
  return(
    <div className="min-h-screen pb-10">
      {/* Header */}
      <header className="bg-gradient-to-r from-blue-600 to-purple-700 text-white px-6 py-4">
        <div className="max-w-7xl mx-auto flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="text-3xl">📉</div>
            <div>
              <h1 className="text-2xl font-bold">GMV 智能归因系统</h1>
              <p className="text-blue-200">双指标树 · 熵减算法 · RACI 定责</p>
            </div>
          </div>
          <div className="flex gap-2">
            {["dual","org","op"].map(t=>{
              const label=t==="dual"?"双树对比":t==="org"?"组织侧":"经营侧";
              const cls=tab===t?"bg-white text-blue-600":"bg-white/20 hover:bg-white/30";
              return<button key={t} onClick={()=>setTab(t)} className={cls+" px-4 py-2 rounded-lg font-medium transition"}>{label}</button>;
            })}
          </div>
        </div>
      </header>

      <main className="max-w-7xl mx-auto p-6 space-y-6">
        {/* 双树展示 */}
        <div className={"grid "+(tab==="dual"?"grid-cols-2":"grid-cols-1")+" gap-6"}>
          {/* 组织侧 */}
          {(tab==="dual"||tab==="org")&&(
            <div className="bg-white rounded-xl shadow-lg p-6">
              <h3 className="text-xl font-bold text-blue-800 mb-4 flex items-center gap-2">
                <span className="w-4 h-4 bg-blue-500 rounded-full"></span>
                【组织侧】定责树
              </h3>
              <div className="bg-blue-50 rounded-lg p-4 overflow-auto max-h-[500px]">
                <TreeNodeWrap node={orgTree} isOrg={true} isAnomaly={true}/>
              </div>
              <RACI raci={orgTree.children[0].children[0].children[0].raci}/>
              <div className="mt-3 text-sm text-gray-600 bg-gray-100 rounded-lg p-3">
                💡 <strong>用途：</strong>确定责任归属，从全球→区域→国家→部门→责任人逐级下钻
              </div>
            </div>
          )}
          
          {/* 经营侧 */}
          {(tab==="dual"||tab==="op")&&(
            <div className="bg-white rounded-xl shadow-lg p-6">
              <h3 className="text-xl font-bold text-emerald-800 mb-4 flex items-center gap-2">
                <span className="w-4 h-4 bg-emerald-500 rounded-full"></span>
                【经营侧】归因树
              </h3>
              <div className="bg-emerald-50 rounded-lg p-4 overflow-auto max-h-[500px]">
                <TreeNodeWrap node={opTree} isOrg={false} isAnomaly={true}/>
              </div>
              <RACI raci={opTree.children[0].children[0].children[0].children[1].children[0].raci}/>
              <div className="mt-3 text-sm text-gray-600 bg-gray-100 rounded-lg p-3">
                💡 <strong>用途：</strong>定位业务根因，通过 GMV = UV × CR × AOV 公式分解 + 维度池切分
              </div>
            </div>
          )}
        </div>

        {/* 归因链路 */}
        <div className="bg-white rounded-xl shadow-lg p-6">
          <h3 className="text-xl font-bold mb-4">🔗 归因链路（异常传播路径）</h3>
          <div className="flex items-center gap-2 overflow-x-auto pb-2">
            {[
              {n:"GMV",c:"-28.8%",t:"root"},
              {n:"亚太区",c:"-45.2%",t:"org"},
              {n:"新加坡",c:"-62.3%",t:"org"},
              {n:"老客UV",c:"-18.3%",t:"op"},
              {n:"会员日活动",c:"-62.3%",t:"rootcause"}
            ].map((item,i,arr)=>{
              let cls="flex flex-col items-center p-3 rounded-lg min-w-[110px] ";
              if(item.t==="rootcause")cls+="bg-red-100 border-2 border-red-500";
              else if(item.t==="org")cls+="bg-blue-100";
              else if(item.t==="op")cls+="bg-emerald-100";
              else cls+="bg-gray-100";
              return(
                <React.Fragment key={i}>
                  <div className={cls}>
                    <span className="font-bold">{item.n}</span>
                    <span className={item.c.includes("-")?"text-red-600 font-bold":"text-green-600"}>{item.c}</span>
                    {item.t==="rootcause"&&<span className="text-xs bg-red-500 text-white px-2 py-0.5 rounded mt-1">🔥根因</span>}
                  </div>
                  {i<arr.length-1&&<span className="text-2xl text-gray-400">→</span>}
                </React.Fragment>
              );
            })}
          </div>
        </div>

        {/* 最终结论与 RACI */}
        <div className="bg-gradient-to-r from-red-50 to-orange-50 rounded-xl shadow-lg p-6 border-2 border-red-200">
          <h3 className="text-xl font-bold text-red-800 mb-4">📋 归因结论与 RACI 责任划分</h3>
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div className="space-y-4">
              <div className="bg-white rounded-lg p-4 shadow">
                <h4 className="font-bold text-gray-800 mb-2">🎯 核心发现</h4>
                <p className="text-gray-700">
                  本次 GMV 下滑主要由 <strong className="text-red-600">新加坡市场部</strong> 的 
                  <strong className="text-red-600">会员日活动参与率</strong> 下降驱动，环比下降 <strong>62.3%</strong>，超过熵减阈值 0.7。
                </p>
              </div>
              <div className="bg-white rounded-lg p-4 shadow">
                <h4 className="font-bold text-gray-800 mb-2">💡 业务建议</h4>
                <ul className="list-disc list-inside text-gray-700 space-y-1 text-sm">
                  <li>紧急排查会员日活动的推送机制是否正常</li>
                  <li>检查新加坡地区的用户触达渠道（Push/短信/邮件）</li>
                  <li>对比历史同期活动数据，定位具体环节问题</li>
                </ul>
              </div>
            </div>
            <div>
              <RACI raci={{
                responsible:["活动运营-赵敏","投放专员-李明"],
                accountable:"新加坡市场总监-王芳",
                consulted:["数据分析师-张华","用户运营-孙丽"],
                informed:["亚太区总经理-陈总","CEO办公室"]
              }}/>
            </div>
          </div>
        </div>

        {/* 说明 */}
        <div className="bg-blue-100 rounded-xl p-4 border border-blue-300">
          <p className="text-sm text-blue-800">
            <strong>💡 Demo 说明：</strong>本演示展示了"双指标树"设计——左侧组织侧用于定责（谁该负责），右侧经营侧用于归因（什么原因）。
            RACI 矩阵明确了优化责任：R=执行人，A=负责人，C=需咨询，I=需知会。
          </p>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
    </script>
</body>
</html>
